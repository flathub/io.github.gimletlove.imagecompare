app-id: io.github.gimletlove.imagecompare
runtime: org.kde.Platform
runtime-version: "6.10"
sdk: org.kde.Sdk
command: imagecompare

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri

cleanup:
  - /include
  - /lib/girepository-1.0
  - /lib/pkgconfig
  - /share/gir-1.0
  - /share/man

modules:
  - name: vips
    buildsystem: meson
    config-opts:
      - -Ddeprecated=false
    sources:
      - type: archive
        url: https://github.com/libvips/libvips/releases/download/v8.18.1/vips-8.18.1.tar.xz
        sha256: 3a0d641175013df712a348d5c528e5f0b46fcbfa4b00b30fcf228c631ffee485

  - name: imagecompare
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: https://github.com/gimletlove/imagecompare/archive/refs/tags/1.0.4.tar.gz
        sha256: a63d03b3e807a710e1d5ee69041d90fee390b52c11a99fd9b14b2755bde73dcf
