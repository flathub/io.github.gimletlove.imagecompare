app-id: io.github.gimletlove.imagecompare
runtime: org.kde.Platform
runtime-version: "6.10"
sdk: org.kde.Sdk
command: imagecompare

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri

cleanup:
  - /include
  - /lib/girepository-1.0
  - /lib/pkgconfig
  - /share/gir-1.0
  - /share/man
  - /bin/vips
  - /bin/vipsedit
  - /bin/vipsheader
  - /bin/vipsthumbnail
  
modules:
  - name: vips
    buildsystem: meson
    config-opts:
      - -Ddeprecated=false
      - -Dexamples=false
      - -Dintrospection=disabled
    sources:
      - type: archive
        url: https://github.com/libvips/libvips/releases/download/v8.18.2/vips-8.18.2.tar.xz
        sha256: a30d4aede16f1c2899c1a2241870f8a7409feafa38484bcdcdac113d6d6f8ff5

  - name: imagecompare
    buildsystem: cmake-ninja
    config-opts:
      - -DIMAGECOMPARE_FLATPAK=ON
    sources:
      - type: archive
        url: https://github.com/gimletlove/imagecompare/archive/refs/tags/1.1.2.tar.gz
        sha256: d912faae472a764ff20e2e2b111bf805b45105f4913692a9a245296cc50f8708
